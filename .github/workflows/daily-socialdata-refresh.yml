name: Daily SocialData Refresh

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-socialdata-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: leaderboard-site/package-lock.json

      - name: Refresh latest SocialData pages
        env:
          SOCIAL_DATA_KEY: ${{ secrets.SOCIAL_DATA_KEY }}
        run: >
          python hotemin_socialdata_export.py
          --output data/hotemin_posts.json
          --resume
          --type Latest
          --refresh-latest-pages 1
          --retries 8
          --sleep 0.7

      - name: Sync leaderboard data
        working-directory: leaderboard-site
        run: |
          npm ci
          npm run sync:data
          npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hotemin_posts.json leaderboard-site/public/data/hotemin_posts.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Hot Emin leaderboard data"
            git push
          fi
